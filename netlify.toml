# Netlify config — Reto IA Vepagos
# Sitio estático + Functions para email transaccional (Resend) y marketing (Brevo).

[build]
  publish = "."
  functions = "netlify/functions"
  # Al desplegar desde Git, Netlify ejecuta este comando antes de empaquetar
  # las funciones. Con Drop no se ejecuta: por eso faltaban node_modules.
  command = "npm install"

[build.environment]
  NODE_VERSION = "20"

[functions]
  # esbuild empaqueta cada función como un único bundle ESM, resolviendo
  # las dependencias del árbol completo (@netlify/blobs + transitivas)
  # sin necesidad de included_files. Es el bundler recomendado por
  # Netlify para funciones ESM (.mjs). zisi rompe con ESM puro porque
  # genera wrappers CommonJS que hacen require() de archivos .mjs.
  node_bundler = "esbuild"

# Alias bonito para la función de sync (por si el config.path de la función no se aplica)
[[redirects]]
  from = "/api/sync"
  to = "/.netlify/functions/sync"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"
